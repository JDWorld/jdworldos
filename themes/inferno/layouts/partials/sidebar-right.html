    <div id="jdw-clock">00:00:00</div>

    <script>
        function updateClock() {
            const now = new Date();
            const timeStr = now.toTimeString().split(' ')[0];
            document.getElementById('jdw-clock').textContent = timeStr;
        }
        setInterval(updateClock, 1000);
        updateClock();
    </script>
